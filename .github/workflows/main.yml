name: Java CI with Gradle

on:
  push:
    branches: [ "**" ]  # Runs on every push to any branch
  pull_request:
    branches: [ "main" ] # Runs on PRs targeting the main branch

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # Sets up the specific JDK needed for your GraalVM build
          java-version: '17'
          java-distribution: 'graalvm'
          # Caching is enabled by default in v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      # Optional: Uncomment this if you want the CI to verify the Native Image build
      # - name: Build Native Image
      #   run: ./gradlew nativeCompile