name: Kepler Signal - Erez

on: [push]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated from v3

      # Requirement 5a: Increase Patch version (1.0.0 -> 1.0.1)
      - name: Auto-increment Version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          # Updates the version in your build file
          sed -i "s/version = .*/version = \"$VERSION\"/" build.gradle.kts

      # Requirement 5b-d: Compile and Create Artifact
      - name: Build and Package
        run: ./gradlew build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4  # Updated from v3 (This fixes your specific error)
        with:
          name: gradle-hello-${{ env.APP_VERSION }}
          path: build/libs/*.jar

      # Requirement 5e-f: Docker Build and Push
      - name: Login to Docker Hub
        uses: docker/login-action@v3  # Updated from v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker
        uses: docker/build-push-action@v5  # Updated from v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kepler-signal:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/kepler-signal:${{ env.APP_VERSION }}

      # Requirement 5g: Download and Run
      - name: Run and Verify Signal
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/kepler-signal:${{ env.APP_VERSION }}
          docker run --rm ${{ secrets.DOCKERHUB_USERNAME }}/kepler-signal:${{ env.APP_VERSION }}
          