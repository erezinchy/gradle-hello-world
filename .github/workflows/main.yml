name: Kepler Signal - Erez

on: [push]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Auto-increment Patch version
      - name: Auto-increment Version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "s/version = .*/version = \"$VERSION\"/" build.gradle.kts

      # Direct execution using the Gradle Wrapper
      - name: Build and Package
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gradle-hello-${{ env.APP_VERSION }}
          path: build/libs/*.jar

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' || secrets.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker
        if: github.event_name != 'pull_request' || secrets.DOCKERHUB_USERNAME != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kepler-signal:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/kepler-signal:${{ env.APP_VERSION }}

      - name: Run and Verify Signal
        if: github.event_name != 'pull_request' || secrets.DOCKERHUB_USERNAME != ''
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/kepler-signal:${{ env.APP_VERSION }}
          docker run --rm ${{ secrets.DOCKERHUB_USERNAME }}/kepler-signal:${{ env.APP_VERSION }}